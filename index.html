<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VidaSana</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://jsdelivr.net"></script>
    <style>
        .tab-active { color: #ef4444 !important; border-top: 2px solid #ef4444; }
        body { -webkit-tap-highlight-color: transparent; }
        .slide-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans">
    <header class="p-4 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-500 rounded-lg flex items-center justify-center text-white"><i class="fas fa-heartbeat"></i></div>
            <h1 class="text-xl font-black text-slate-800 tracking-tighter">VidaSana</h1>
        </div>
        <div class="flex items-center gap-2">
            <div class="bg-orange-50 px-3 py-1 rounded-full border border-orange-100 text-orange-600 font-bold text-sm">
                <span id="header-streak">0</span> 🔥
            </div>
            <select id="lang-select" class="bg-slate-100 px-2 py-1 rounded-lg text-xs font-bold border-none outline-none">
                <option value="es">ES</option>
                <option value="pt">PT</option>
            </select>
        </div>
    </header>

    <main id="app" class="p-4 max-w-md mx-auto"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50 shadow-2xl">
        <button onclick="router('home')" id="nav-home" class="flex flex-col items-center p-2 text-slate-400">
            <i class="fas fa-house text-lg"></i>
            <span class="text-[9px] mt-1 font-bold uppercase tracking-widest">Hoy</span>
        </button>
        <button onclick="router('water')" id="nav-water" class="flex flex-col items-center p-2 text-slate-400">
            <i class="fas fa-droplet text-lg"></i>
            <span class="text-[9px] mt-1 font-bold uppercase tracking-widest">Agua</span>
        </button>
        <button onclick="router('calc')" id="nav-calc" class="flex flex-col items-center p-2 text-slate-400">
            <i class="fas fa-chart-line text-lg"></i>
            <span class="text-[9px] mt-1 font-bold uppercase tracking-widest">Salud</span>
        </button>
    </nav>
    <script src="app.js"></script>
</body>
</html>
