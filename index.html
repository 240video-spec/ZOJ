<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VidaSana</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Конфетти для "Excelente" -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <header class="p-4 flex items-center justify-between bg-white shadow-sm sticky" style="top:0; z-index:50;">
        <div class="flex items-center" style="gap:10px;">
            <div style="background:#ef4444; width:35px; height:35px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:white;">
                <i class="fas fa-heartbeat"></i>
            </div>
            <span style="font-weight:900; font-size:20px;">VidaSana</span>
        </div>
        <div class="flex items-center" style="gap:10px;">
            <div style="background:#fff7ed; padding:5px 12px; border-radius:20px; border:1px solid #ffedd5; color:#ea580c; font-weight:bold;">
                <span id="header-streak">0</span> 🔥
            </div>
            <select id="lang-select" style="border:none; background:#f1f5f9; padding:5px; border-radius:8px; font-weight:bold;">
                <option value="es">ES</option>
                <option value="pt">PT</option>
            </select>
        </div>
    </header>

    <main id="app" class="p-4" style="max-width:500px; margin:0 auto;"></main>

    <nav style="position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #f1f5f9; display:flex; justify-content:space-around; padding:10px; z-index:100;">
        <button onclick="router('home')" id="nav-home" style="background:none; border:none; color:#94a3b8; display:flex; flex-direction:column; align-items:center;">
            <i class="fas fa-house" style="font-size:20px;"></i>
            <span style="font-size:10px; font-weight:bold; margin-top:4px;">HOY</span>
        </button>
        <button onclick="router('water')" id="nav-water" style="background:none; border:none; color:#94a3b8; display:flex; flex-direction:column; align-items:center;">
            <i class="fas fa-droplet" style="font-size:20px;"></i>
            <span style="font-size:10px; font-weight:bold; margin-top:4px;">AGUA</span>
        </button>
        <button onclick="router('calc')" id="nav-calc" style="background:none; border:none; color:#94a3b8; display:flex; flex-direction:column; align-items:center;">
            <i class="fas fa-chart-line" style="font-size:20px;"></i>
            <span style="font-size:10px; font-weight:bold; margin-top:4px;">SALUD</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
