<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VidaSana - Tu Guía Saludable</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
	<script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        .slide-in { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { color: #ef4444 !important; border-top: 2px solid #ef4444; }
        body { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 font-sans">
    <header class="p-4 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-500 rounded-lg flex items-center justify-center text-white">
                <i class="fas fa-heartbeat"></i>
            </div>
            <h1 class="text-xl font-black text-slate-800 tracking-tighter">VidaSana</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="bg-orange-100 px-3 py-1 rounded-full flex items-center border border-orange-200">
                <span id="streak-val" class="font-bold text-orange-600 mr-1">0</span>
                <span>🔥</span>
            </div>
            <select id="lang-select" class="bg-slate-100 px-2 py-1 rounded-lg text-xs font-bold outline-none border-none">
                <option value="es">ES</option>
                <option value="pt">PT</option>
            </select>
        </div>
    </header>

    <main id="app" class="p-4 max-w-md mx-auto"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 z-50 shadow-2xl">
        <button onclick="router('home')" id="nav-home" class="flex flex-col items-center p-2 text-slate-400">
            <i class="fas fa-house text-xl"></i>
            <span class="text-[10px] mt-1 font-bold uppercase tracking-widest" data-i18n="nav_home">Hoy</span>
        </button>
        <button onclick="router('water')" id="nav-water" class="flex flex-col items-center p-2 text-slate-400">
            <i class="fas fa-droplet text-xl"></i>
            <span class="text-[10px] mt-1 font-bold uppercase tracking-widest" data-i18n="nav_water">Agua</span>
        </button>
        <button onclick="router('calc')" id="nav-calc" class="flex flex-col items-center p-2 text-slate-400">
            <i class="fas fa-calculator text-xl"></i>
            <span class="text-[10px] mt-1 font-bold uppercase tracking-widest" data-i18n="nav_calc">Salud</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
